name: Build macOS

# 仅手动触发，从最新的 main 分支构建 macOS arm64 和 x64 安装包
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-macos:
    name: macOS ${{ matrix.arch }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]

    steps:
      - name: Checkout repository (main)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.13.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate app icon
        run: npm run make-icon

      - name: Build macOS ${{ matrix.arch }} package
        run: npm run build && npx electron-builder --mac dmg zip --${{ matrix.arch }} --publish never
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Upload macOS ${{ matrix.arch }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: pi-desktop-macos-${{ matrix.arch }}
          if-no-files-found: error
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml
