name: Build Linux

# 仅手动触发，从最新的 main 分支构建 Linux arm64 和 x64 安装包
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-linux:
    name: Linux ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]

    steps:
      - name: Checkout repository (main)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.13.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate app icon
        run: npm run make-icon

      - name: Build Linux ${{ matrix.arch }} package
        run: npm run build && npx electron-builder --linux AppImage deb tar.gz --${{ matrix.arch }} --publish never
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Upload Linux ${{ matrix.arch }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: pi-desktop-linux-${{ matrix.arch }}
          if-no-files-found: error
          path: |
            release/*.AppImage
            release/*.deb
            release/*.tar.gz
            release/*.blockmap
            release/latest-linux.yml
